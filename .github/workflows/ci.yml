name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  host-tests:
    name: Host unit tests (provisioner_proto)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S esp32/provisioner/test/host -B build/host
      - name: Build
        run: cmake --build build/host
      - name: Test
        run: ctest --test-dir build/host --output-on-failure

  esp-build:
    name: ESP-IDF build (basic example, ${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [esp32, esp32s3, esp32c3]
    steps:
      - uses: actions/checkout@v4
      - name: Build with esp-idf-ci-action
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.1
          target: ${{ matrix.target }}
          path: esp32/provisioner/examples/basic
